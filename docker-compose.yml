# Campus Connect — Docker Compose Configuration
# Usage: docker-compose up --build
# Access: Frontend at http://localhost, Backend at http://localhost:3000

version: '3.8'

services:
  # ─── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: campus-connect-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - campus-network
    restart: unless-stopped

  # ─── Backend (Node.js + Express) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-connect-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI:-mongodb+srv://vvrahul2006_db_user:vUNUKrmrEZeJLXCW@cluster0.o5rdsum.mongodb.net/campusconnect}
      - JWT_SECRET=${JWT_SECRET:-jwt_secret}
      - EXPRESS_SESSION_SECRET=${EXPRESS_SESSION_SECRET:-yuhhuuuu}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    networks:
      - campus-network
    restart: unless-stopped

  # ─── Redis (Caching Layer) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: campus-connect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - campus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch (Search Engine) ─────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: campus-connect-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - campus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

# ─── Volumes ─────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local
  es-data:
    driver: local
  backend-uploads:
    driver: local
  backend-logs:
    driver: local

# ─── Networks ────────────────────────────────────────────────────
networks:
  campus-network:
    driver: bridge
